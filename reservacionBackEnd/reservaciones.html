<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="css/reser.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Gestión de Reservaciones</title>
</head>

<body>

    <div class="container mt-5">

        <button type="button" class="btn btn-primary mb-3" onclick="window.history.back();">Regresar</button>

        <h1 class="text-center">Reservaciones</h1>

        <!-- Botón para abrir el modal de nueva reservación -->
        <button type="button" class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#formDataReservacion">
            Nueva Reservación
        </button>

        <!-- Tabla de reservaciones -->
        <table class="table">
            <thead>
                <tr>
                    <th scope="col">Folio</th>
                    <th scope="col">Cliente</th>
                    <th scope="col">Acciones</th>
                </tr>
            </thead>
            <tbody id="tDataReservaciones">
                <!-- Las filas se generan dinámicamente -->
            </tbody>
        </table>

        <!-- Modal para agregar nueva reservación -->
        <div class="modal fade" id="formDataReservacion" tabindex="-1" aria-labelledby="formDataLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="formDataLabel">Nueva Reservación</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label for="folioReservacion" class="form-label">Folio</label>
                                <input type="text" class="form-control" id="folioReservacion"
                                    placeholder="Folio de la reservación">
                            </div>
                            <div class="mb-3">
                                <label for="clienteReservacion" class="form-label">Cliente</label>
                                <input type="text" class="form-control" id="clienteReservacion"
                                    placeholder="Nombre del cliente">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cerrar</button>
                        <button type="button" class="btn btn-primary" onclick="guardarReservacion()">Guardar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal para actualizar reservación -->
        <div class="modal fade" id="updateReservacion" tabindex="-1" aria-labelledby="updateReservacionLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="updateReservacionLabel">Actualizar Reservación</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label for="folioReservacionU" class="form-label">Folio</label>
                                <input type="text" class="form-control" id="folioReservacionU">
                            </div>
                            <div class="mb-3">
                                <label for="clienteReservacionU" class="form-label">Cliente</label>
                                <input type="text" class="form-control" id="clienteReservacionU">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cerrar</button>
                        <button type="button" class="btn btn-primary" onclick="actualizarReservacion()">Actualizar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="js/scriptsreservaciones.js"></script>
</body>

</html>
