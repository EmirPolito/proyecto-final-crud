<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/index.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <title>Gestión de Clientes</title>
  </head>

  <body>
    <div class="container mt-5">
      <button
        type="button"
        class="btn btn-primary mb-3"
        onclick="window.history.back();"
      >
        Regresar
      </button>

      <h1 class="text-center">Clientes</h1>

      <!-- Botón para abrir el modal de nuevo cliente -->
      <button
        type="button"
        class="btn btn-primary mb-3"
        data-bs-toggle="modal"
        data-bs-target="#formData"
      >
        Nuevo Cliente
      </button>
      <!-- <button type="button" class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#formData">Nuevo Cliente</button> -->

      <!-- Tabla de clientes -->
      <table class="table">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Nombre</th>
            <th scope="col">Correo</th>
            <th scope="col">Teléfono</th>
            <th scope="col">Acciones</th>
          </tr>
        </thead>
        <tbody id="tDataCliente">
          <!-- Las filas se generan dinámicamente desde scripts.js -->
        </tbody>
      </table>

      <!-- Modal para agregar nuevo cliente -->
      <div
        class="modal fade"
        id="formData"
        tabindex="-1"
        aria-labelledby="formDataLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="formDataLabel">Nuevo Cliente</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <form>
                <div class="mb-3">
                  <label for="clientName" class="form-label">Nombre</label>
                  <input
                    type="text"
                    class="form-control"
                    id="clientName"
                    placeholder="Ingrese el nombre"
                  />
                </div>
                <div class="mb-3">
                  <label for="clientEmail" class="form-label">Correo</label>
                  <input
                    type="email"
                    class="form-control"
                    id="clientEmail"
                    placeholder="Ingrese el correo"
                  />
                </div>
                <div class="mb-3">
                  <label for="clientPhone" class="form-label">Teléfono</label>
                  <input
                    type="text"
                    class="form-control"
                    id="clientPhone"
                    placeholder="Ingrese el teléfono"
                  />
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-danger"
                data-bs-dismiss="modal"
              >
                Cerrar
              </button>
              <button
                type="button"
                class="btn btn-primary"
                onclick="guardarDataCliente()"
              >
                Guardar
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Dialog para actualizar cliente -->
      <dialog id="formDataCliente">
        <form>
          <div class="mb-3">
            <label for="clientNameU" class="form-label">Nombre</label>
            <input
              type="text"
              class="form-control"
              id="clientNameU"
              placeholder="Ingrese el nombre"
            />
          </div>
          <div class="mb-3">
            <label for="clientEmailU" class="form-label">Correo</label>
            <input
              type="email"
              class="form-control"
              id="clientEmailU"
              placeholder="Ingrese el correo"
            />
          </div>
          <div class="mb-3">
            <label for="clientPhoneU" class="form-label">Teléfono</label>
            <input
              type="text"
              class="form-control"
              id="clientPhoneU"
              placeholder="Ingrese el teléfono"
            />
          </div>
        </form>
        <button type="button" class="btn btn-danger" onclick="cerrarDialogo()">
          Cerrar
        </button>
        <button
          type="button"
          class="btn btn-primary"
          onclick="actualizarDataCliente()"
        >
          Actualizar
        </button>
      </dialog>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <script src="js/scripts.js"></script>
  </body>
</html>
